<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISLA Insight - Strategic Leadership Framework</title>
    <meta http-equiv="refresh" content="0; url=https://forisaabadijayasejahtera.github.io/ISLA-Insight/">
    <script>
        window.location.href = "https://forisaabadijayasejahtera.github.io/ISLA-Insight/";
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .redirect-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .logo-section {
            margin-bottom: 2rem;
        }

        .isla-badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            font-weight: bold;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin: 2rem auto;
        }

        .loading-progress {
            width: 100%;
            height: 100%;
            background: #ffffff;
            animation: loading 1.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .manual-link {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .manual-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        /* Footer - Sesuai dengan struktur yang sudah ada */
        footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.9;
        }

        .contact-item a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .contact-item a:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        .copyright {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .contact-info {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="logo-section">
            <div class="isla-badge">ISLA</div>
            <h1>ISLA Insight</h1>
            <p class="subtitle">Strategic Leadership Framework - Mengarahkan Anda ke platform insight utama...</p>
        </div>
        
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
        
        <p>Jika tidak terredirect otomatis, klik tombol di bawah:</p>
        
        <a href="https://forisaabadijayasejahtera.github.io/ISLA-Insight/" class="manual-link">
            Kunjungi ISLA Insight →
        </a>
    </div>

    <footer>
        <div class="footer-content">
            <div class="contact-info">
                <div class="contact-item">
                    <span>📧</span>
                    <a href="mailto:info.forisaimpact@gmail.com">info.forisaimpact@gmail.com</a>
                </div>
                <div class="contact-item">
                    <span>📱</span>
                    <a href="https://wa.me/6285117283177" target="_blank">WhatsApp</a>
                </div>
                <div class="contact-item">
                    <span>💼</span>
                    <a href="https://www.linkedin.com/in/yanto-goutama-chcm-cplc-369322223/" target="_blank">LinkedIn</a>
                </div>
            </div>
            <div class="copyright">
                © 2026 Yanto Goutama. All Rights Reserved.
            </div>
        </div>
    </footer>
</body>
</html>
